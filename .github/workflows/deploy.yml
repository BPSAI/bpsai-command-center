name: Deploy to Container Apps (GHCR)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/bpsai/bpsai-command-center
  CONTAINER_APP: ca-command-center-cus-prod
  RESOURCE_GROUP: rg-paircoder-cus-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CACOMMANDCENTERCUSPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CACOMMANDCENTERCUSPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CACOMMANDCENTERCUSPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure GHCR registry on Container App
        run: |
          az containerapp registry set \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ghcr.io \
            --username BPSAI \
            --password ${{ secrets.GHCR_PAT }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test
        run: |
          echo "Waiting 30s for new revision to start..."
          sleep 30

          MAX_RETRIES=5
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://command.paircoder.ai/login)
            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Smoke test PASSED"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "Smoke test FAILED — HTTP $STATUS after $MAX_RETRIES attempts"
          exit 1
