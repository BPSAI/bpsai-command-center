<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Crosshair lines -->
  <line x1="16" y1="4" x2="16" y2="10" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="16" y2="28" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="10" y2="16" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <line x1="22" y1="16" x2="28" y2="16" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Center reticle ring -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.8"/>
  <!-- Arrow indicator (top-left) -->
  <polyline points="6,4 4,4 4,6" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="4" y1="4" x2="10" y2="10" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.9" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#00f0ff" fill-opacity="0.9"/>
</svg>
